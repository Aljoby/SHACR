topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A45
      name: Apartment_45
      category: YoungProfessional
      rooms:
      - id: R451
        name: LivingRoom
        devices:
        - id: D4511
          name: LightSensor_A45
          type: light_sensor
          platform: HomeAssistant
          states:
          - id: ST_A45_LR_LIGHT_LEVEL
            name: LIGHT_LEVEL
        - id: D4512
          name: LivingRoomBlinds_A45
          type: smart_blinds
          platform: openHAB
          capabilities:
          - id: CAP_A45_LR_BLINDS
            name: BLIND_CONTROL
          states:
          - id: ST_A45_LR_BLINDS
            name: BLIND_POSITION
        - id: D4513
          name: LivingRoomLamp_A45
          type: smart_light
          platform: SmartThings
          capabilities:
          - id: CAP_A45_LR_LAMP
            name: POWER
          states:
          - id: ST_A45_LR_LAMP
            name: LAMP_POWER
semantics:
  affects:
  - from_capability_id: CAP_A45_LR_BLINDS
    to_state_id: ST_A45_LR_BLINDS
    note: Blind actuation changes blind position state.
  - from_capability_id: CAP_A45_LR_LAMP
    to_state_id: ST_A45_LR_LAMP
    note: Lamp actuation changes lamp state.
evars: []
contexts: []
states: []
rules:
- id: R_A45_LR_1
  name: Daylight Open Blinds
  platform: openHAB
  applies_in:
    kind: Apartment
    id: A45
  description: Opens blinds when natural light level is high.
  triggers:
  - id: T_A45_LR_1
    type: state
    operator: '>'
    value: 5000
    targets:
    - kind: State
      id: ST_A45_LR_LIGHT_LEVEL
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A45_LR_1
    type: capability_actuation
    action: OPEN
    applies_to_device_id: D4512
    targets:
    - kind: Capability
      id: CAP_A45_LR_BLINDS
      role: ACTUATE
- id: R_A45_LR_2
  name: Dim Light Lamp On
  platform: SmartThings
  applies_in:
    kind: Apartment
    id: A45
  description: Turns on lamp when natural light is dim.
  triggers:
  - id: T_A45_LR_2
    type: state
    operator: <
    value: 200
    targets:
    - kind: State
      id: ST_A45_LR_LIGHT_LEVEL
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A45_LR_2
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D4513
    targets:
    - kind: Capability
      id: CAP_A45_LR_LAMP
      role: ACTUATE
