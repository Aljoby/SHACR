topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A16
      name: Apartment_16
      category: FamilyWithKids
      rooms:
      - id: R161
        name: Kitchen
        devices:
        - id: D161
          name: KitchenSmokeSensor_A16
          type: smoke_sensor
          platform: openHAB
          states:
          - id: ST_A16_KIT_SMOKE
            name: SMOKE_DETECTED
        - id: D162
          name: KitchenGasSensor_A16
          type: gas_sensor
          platform: HomeAssistant
          states:
          - id: ST_A16_KIT_GAS
            name: GAS_LEAK_DETECTED
        - id: D163
          name: KitchenExhaustFan_A16
          type: exhaust_fan
          platform: SmartThings
          capabilities:
          - id: CAP_A16_KIT_FAN_POWER
            name: POWER
          states:
          - id: ST_A16_KIT_FAN_POWER
            name: FAN_POWER
semantics:
  affects:
  - from_capability_id: CAP_A16_KIT_FAN_POWER
    to_state_id: ST_A16_KIT_FAN_POWER
    note: Fan power actuation changes exhaust fan state.
evars: []
contexts:
- id: CTX_A16_ENERGY_SAVING
  name: EnergySavingOn
  scope: apartment
  scope_id: A16
states: []
rules:
- id: R_A16_KIT_1
  name: Smoke Ventilation Response
  platform: openHAB
  applies_in:
    kind: Apartment
    id: A16
  description: Turns on the kitchen exhaust fan when smoke is detected.
  triggers:
  - id: T_A16_KIT_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A16_KIT_SMOKE
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A16_KIT_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D163
    targets:
    - kind: Capability
      id: CAP_A16_KIT_FAN_POWER
      role: ACTUATE
- id: R_A16_KIT_2
  name: Gas Leak Ventilation Response
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A16
  description: Turns on the kitchen exhaust fan when a gas leak is detected.
  triggers:
  - id: T_A16_KIT_2
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A16_KIT_GAS
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A16_KIT_2
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D163
    targets:
    - kind: Capability
      id: CAP_A16_KIT_FAN_POWER
      role: ACTUATE
- id: R_A16_KIT_3
  name: Energy Saving Fan Off
  platform: SmartThings
  applies_in:
    kind: Apartment
    id: A16
  description: Turns off the kitchen exhaust fan when energy-saving mode is enabled.
  triggers: []
  conditions:
  - id: C_A16_KIT_3
    type: context
    operator: ==
    value: true
    targets:
    - kind: Context
      id: CTX_A16_ENERGY_SAVING
      role: CHECK
  actions:
  - id: A_A16_KIT_3
    type: capability_actuation
    action: 'OFF'
    applies_to_device_id: D163
    targets:
    - kind: Capability
      id: CAP_A16_KIT_FAN_POWER
      role: ACTUATE
