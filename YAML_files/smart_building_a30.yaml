rules:
- id: R_A30_KT_1
  name: Smoke Detection Fan
  platform: openHAB
  applies_in:
    kind: Apartment
    id: A30
  description: Turns on the kitchen exhaust fan when smoke is detected.
  triggers:
  - id: T_A30_KT_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A30_KT_SMOKE
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A30_KT_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D3012
    targets:
    - kind: Capability
      id: CAP_A30_KT_FAN
      role: ACTUATE
- id: R_A30_KT_2
