          name: KitchenLight_A30
          type: smart_light
          platform: SmartThings
          capabilities:
          - id: CAP_A30_KT_LIGHT
            name: POWER
          states:
          - id: ST_A30_KT_LIGHT
            name: LIGHT_POWER
        - id: D3014
          name: KitchenMotionSensor_A30
          type: motion_sensor
          platform: SmartThings
          states:
