topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A53
      name: Apartment_53
      category: YoungProfessional
      rooms:
      - id: R531
        name: HomeOffice
        devices:
        - id: D5311
          name: OfficeSpeaker_A53
          type: smart_speaker
          platform: HomeAssistant
          capabilities:
          - id: CAP_A53_OF_SPEAKER
            name: VOLUME
