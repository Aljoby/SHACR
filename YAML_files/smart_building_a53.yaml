            name: VOLUME_LEVEL
        - id: D5312
          name: OfficeNotificationHub_A53
          type: notification_hub
          platform: SmartThings
          capabilities:
          - id: CAP_A53_OF_NOTIF
            name: ALERT
          states:
          - id: ST_A53_OF_NOTIF
            name: NOTIF_STATE
        - id: D5313
          name: DoorbellSensor_A53
          type: doorbell
          platform: openHAB
          states:
