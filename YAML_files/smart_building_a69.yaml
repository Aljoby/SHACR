topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A69
      name: Apartment_69
      category: ElderlyHealthCare
      rooms:
      - id: R691
        name: Bedroom
        devices:
        - id: D691
          name: BedroomMotionSensor_A69
          type: motion_sensor
          platform: SmartThings
          states:
          - id: ST_A69_BR_MOTION
            name: MOTION_DETECTED
        - id: D692
          name: OxygenConcentratorPlug_A69
          type: smart_plug
          platform: HomeAssistant
          capabilities:
          - id: CAP_A69_OXY_PLUG_POWER
            name: POWER
          states:
          - id: ST_A69_OXY_PLUG_POWER
            name: PLUG_POWER
        - id: D693
          name: MedicalOxygenConcentrator_A69
          type: oxygen_concentrator
          platform: MedicalIoT
          states:
          - id: ST_A69_OXYGEN_FLOW
            name: OXYGEN_FLOW_ACTIVE

semantics:
  affects:
  - from_capability_id: CAP_A69_OXY_PLUG_POWER
    to_state_id: ST_A69_OXY_PLUG_POWER
    note: Smart plug power actuation changes the plug power state.
  - from_capability_id: CAP_A69_OXY_PLUG_POWER
    to_state_id: ST_A69_OXYGEN_FLOW
    note: Cutting power to the plug disables oxygen concentrator flow.

evars: []

contexts:
- id: CTX_A69_AFTER_MIDNIGHT
  name: AfterMidnight
  scope: apartment
  scope_id: A69
- id: CTX_A69_ENERGY_SAVING
  name: EnergySavingOn
  scope: apartment
  scope_id: A69

states:
- id: ST_A69_HIGH_DRAW_IDLE
  name: HighDrawIdlePlug
  scope: apartment
  scope_id: A69

rules:
- id: R_A69_BR_1
  name: Idle High Draw Plug Detection
  platform: SmartThings
  applies_in:
    kind: Apartment
    id: A69
  description: Marks high-draw plugs as idle when no bedroom motion is detected after midnight.
  triggers:
  - id: T_A69_BR_1
    type: state
    operator: ==
    value: false
    targets:
    - kind: State
      id: ST_A69_BR_MOTION
      role: OBSERVE
  conditions:
  - id: C_A69_BR_1
    type: context
    operator: ==
    value: true
    targets:
    - kind: Context
      id: CTX_A69_AFTER_MIDNIGHT
      role: CHECK
  actions:
  - id: A_A69_BR_1
    type: state_update
    action: SET_TRUE
    applies_to_device_id: D692
    targets:
    - kind: State
      id: ST_A69_HIGH_DRAW_IDLE
      role: ACTUATE

- id: R_A69_BR_2
  name: Midnight Energy Saving Plug Cutoff
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A69
  description: Turns off idle high-draw plugs during energy-saving mode after midnight.
  triggers: []
  conditions:
  - id: C_A69_BR_2
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A69_HIGH_DRAW_IDLE
      role: CHECK
  - id: C_A69_BR_3
    type: context
    operator: ==
    value: true
    targets:
    - kind: Context
      id: CTX_A69_ENERGY_SAVING
      role: CHECK
  actions:
  - id: A_A69_BR_2
    type: capability_actuation
    action: OFF
    applies_to_device_id: D692
    targets:
    - kind: Capability
      id: CAP_A69_OXY_PLUG_POWER
      role: ACTUATE