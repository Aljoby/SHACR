topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A55
      name: Apartment_55
      category: Bachelor
      rooms:
      - id: R551
        name: LivingRoom
        devices:
        - id: D5511
          name: LivingRoomCamera_A55
          type: camera
          platform: HomeAssistant
          capabilities:
          - id: CAP_A55_LR_CAM
            name: POWER
          states:
          - id: ST_A55_LR_CAM
            name: CAM_POWER
        - id: D5512
          name: LivingRoomMotion_A55
          type: motion_sensor
          platform: SmartThings
          states:
          - id: ST_A55_LR_MOTION
            name: MOTION_DETECTED
        - id: D5513
          name: LivingRoomLight_A55
          type: smart_light
          platform: openHAB
          capabilities:
          - id: CAP_A55_LR_LIGHT
            name: POWER
          states:
          - id: ST_A55_LR_LIGHT
            name: LIGHT_POWER
semantics:
  affects:
  - from_capability_id: CAP_A55_LR_CAM
    to_state_id: ST_A55_LR_CAM
    note: Camera actuation changes camera state.
  - from_capability_id: CAP_A55_LR_LIGHT
    to_state_id: ST_A55_LR_LIGHT
    note: Light actuation changes light state.
evars: []
contexts:
- id: CTX_A55_AWAY
  name: Away
  scope: apartment
  scope_id: A55
states: []
rules:
- id: R_A55_LR_1
  name: Away Camera On
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A55
  description: Powers on camera while away.
  triggers: []
  conditions:
  - id: C_A55_LR_1
    type: context
    operator: ==
    value: true
    targets:
    - kind: Context
      id: CTX_A55_AWAY
      role: CHECK
  actions:
  - id: A_A55_LR_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D5511
    targets:
    - kind: Capability
      id: CAP_A55_LR_CAM
      role: ACTUATE
- id: R_A55_LR_2
  name: Motion Auto Light
  platform: SmartThings
  applies_in:
    kind: Apartment
    id: A55
  description: Turns on light when motion detected for visibility.
  triggers:
  - id: T_A55_LR_2
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A55_LR_MOTION
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A55_LR_2
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D5513
    targets:
    - kind: Capability
      id: CAP_A55_LR_LIGHT
      role: ACTUATE
- id: R_A55_LR_3
  name: Camera Energy Saving Off
  platform: openHAB
  applies_in:
    kind: Apartment
    id: A55
  description: Turns off camera when light is on to save energy - logical conflict with away surveillance.
  triggers:
  - id: T_A55_LR_3
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A55_LR_LIGHT
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A55_LR_3
    type: capability_actuation
    action: 'OFF'
    applies_to_device_id: D5511
    targets:
    - kind: Capability
      id: CAP_A55_LR_CAM
      role: ACTUATE
