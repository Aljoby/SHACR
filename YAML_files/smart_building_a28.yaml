topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A28
      name: Apartment_28
      category: YoungProfessional
      rooms:
      - id: R281
        name: Bedroom
        devices:
        - id: D2811
          name: BedroomLight_A28
          type: smart_light
          platform: HomeAssistant
          capabilities:
          - id: CAP_A28_BR_LIGHT
            name: POWER
          states:
          - id: ST_A28_BR_LIGHT
            name: LIGHT_POWER
        - id: D2812
          name: BedroomBlinds_A28
          type: smart_blinds
          platform: openHAB
          capabilities:
          - id: CAP_A28_BR_BLINDS
            name: BLIND_CONTROL
          states:
          - id: ST_A28_BR_BLINDS
