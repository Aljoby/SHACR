    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A52_LR_MOTION
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A52_LR_2
    type: capability_actuation
    action: SET_COMFORT
    applies_to_device_id: D5211
    targets:
    - kind: Capability
      id: CAP_A52_LR_THERMO
      role: ACTUATE
