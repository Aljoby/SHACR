topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A54
      name: Apartment_54
      category: FamilyWithKids
      rooms:
      - id: R541
        name: Kitchen
        devices:
        - id: D5411
          name: SmartRefrigerator_A54
          type: smart_refrigerator
          platform: SmartThings
          states:
          - id: ST_A54_KT_FRIDGE_TEMP
            name: FRIDGE_TEMP
          - id: ST_A54_KT_FRIDGE_DOOR
            name: DOOR_OPEN
        - id: D5412
          name: KitchenNotifier_A54
          type: notification_hub
          platform: HomeAssistant
          capabilities:
          - id: CAP_A54_KT_NOTIFIER
            name: ALERT
          states:
          - id: ST_A54_KT_NOTIFIER
            name: NOTIF_STATE
        - id: D5413
          name: KitchenLight_A54
          type: smart_light
          platform: openHAB
          capabilities:
          - id: CAP_A54_KT_LIGHT
            name: POWER
          states:
          - id: ST_A54_KT_LIGHT
            name: LIGHT_POWER
semantics:
  affects:
  - from_capability_id: CAP_A54_KT_NOTIFIER
    to_state_id: ST_A54_KT_NOTIFIER
    note: Notifier actuation changes notification state.
  - from_capability_id: CAP_A54_KT_LIGHT
    to_state_id: ST_A54_KT_LIGHT
    note: Light actuation changes light state.
evars: []
contexts: []
states: []
rules:
- id: R_A54_KT_1
  name: Fridge Door Open Alert
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A54
  description: Sends notification when fridge door is left open too long.
  triggers:
  - id: T_A54_KT_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A54_KT_FRIDGE_DOOR
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A54_KT_1
    type: capability_actuation
    action: SEND_ALERT
    applies_to_device_id: D5412
    targets:
    - kind: Capability
      id: CAP_A54_KT_NOTIFIER
      role: ACTUATE
- id: R_A54_KT_2
  name: Fridge Temp High Alert
  platform: SmartThings
  applies_in:
    kind: Apartment
    id: A54
  description: Sends notification when fridge temperature exceeds safe level.
  triggers:
  - id: T_A54_KT_2
    type: state
    operator: '>'
    value: 8
    targets:
    - kind: State
      id: ST_A54_KT_FRIDGE_TEMP
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A54_KT_2
    type: capability_actuation
    action: SEND_ALERT
    applies_to_device_id: D5412
    targets:
    - kind: Capability
      id: CAP_A54_KT_NOTIFIER
      role: ACTUATE
- id: R_A54_KT_3
  name: Fridge Door Open Light
  platform: openHAB
  applies_in:
    kind: Apartment
    id: A54
  description: Turns on kitchen light when fridge door is opened.
  triggers:
  - id: T_A54_KT_3
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A54_KT_FRIDGE_DOOR
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A54_KT_3
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D5413
    targets:
    - kind: Capability
      id: CAP_A54_KT_LIGHT
      role: ACTUATE
