- id: CTX_A47_AWAY
  name: Away
  scope: apartment
  scope_id: A47
- id: CTX_A47_FEEDING_TIME
  name: FeedingTime
  scope: apartment
  scope_id: A47
states: []
rules:
- id: R_A47_LR_1
  name: Scheduled Pet Feeding
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A47
  description: Dispenses pet food at scheduled feeding time.
  triggers: []
  conditions:
  - id: C_A47_LR_1
    type: context
    operator: ==
    value: true
    targets:
    - kind: Context
      id: CTX_A47_FEEDING_TIME
      role: CHECK
