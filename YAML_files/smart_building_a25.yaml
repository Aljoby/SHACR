topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A25
      name: Apartment_25
      category: Bachelor
      rooms:
      - id: R251
        name: Entrance
        devices:
        - id: D251
          name: EntranceDoorContact_A25
          type: door_contact_sensor
          platform: HomeAssistant
          states:
          - id: ST_A25_ENT_DOOR_OPEN
            name: DOOR_OPEN
        - id: D252
          name: EntranceLight_A25
          type: smart_light
          platform: SmartThings
          capabilities:
          - id: CAP_A25_ENT_LIGHT_POWER
            name: POWER
          states:
          - id: ST_A25_ENT_LIGHT_POWER
            name: LIGHT_POWER
      - id: R252
        name: Hallway
        devices:
        - id: D253
          name: HallwaySmokeSensor_A25
          type: smoke_sensor
          platform: openHAB
          states:
          - id: ST_A25_HAL_SMOKE
            name: SMOKE_DETECTED
        - id: D254
          name: HallwayLight_A25
          type: smart_light
          platform: HomeAssistant
          capabilities:
          - id: CAP_A25_HAL_LIGHT_POWER
            name: POWER
          states:
          - id: ST_A25_HAL_LIGHT_POWER
            name: LIGHT_POWER
semantics:
  affects:
  - from_capability_id: CAP_A25_ENT_LIGHT_POWER
    to_state_id: ST_A25_ENT_LIGHT_POWER
    note: Light actuation changes entrance light state.
  - from_capability_id: CAP_A25_HAL_LIGHT_POWER
    to_state_id: ST_A25_HAL_LIGHT_POWER
    note: Light actuation changes hallway light state.
evars: []
contexts:
- id: CTX_A25_EVENING
  name: Evening
  scope: apartment
  scope_id: A25
- id: CTX_A25_OCCUPIED
  name: Occupied
  scope: apartment
  scope_id: A25
states: []
rules:
- id: R_A25_ENT_1
  name: Entrance Welcome Light
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A25
  description: Turns on the entrance light when the door opens in the evening while
    occupied.
  triggers:
  - id: T_A25_ENT_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A25_ENT_DOOR_OPEN
      role: OBSERVE
  conditions:
  - id: C_A25_ENT_1
    type: context
    operator: ==
    value: true
    targets:
    - kind: Context
      id: CTX_A25_EVENING
      role: CHECK
  - id: C_A25_ENT_2
    type: context
    operator: ==
    value: true
    targets:
    - kind: Context
      id: CTX_A25_OCCUPIED
      role: CHECK
  actions:
  - id: A_A25_ENT_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D252
    targets:
    - kind: Capability
      id: CAP_A25_ENT_LIGHT_POWER
      role: ACTUATE
- id: R_A25_HAL_1
  name: Hallway Smoke Safety Light
  platform: openHAB
  applies_in:
    kind: Apartment
    id: A25
  description: Turns on the hallway light when smoke is detected.
  triggers:
  - id: T_A25_HAL_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A25_HAL_SMOKE
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A25_HAL_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D254
    targets:
    - kind: Capability
      id: CAP_A25_HAL_LIGHT_POWER
      role: ACTUATE
