topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A26
      name: Apartment_26
      category: Elderly
      rooms:
      - id: R261
        name: Bedroom
        devices:
        - id: D261
          name: BedroomDoorContact_A26
          type: door_contact_sensor
          platform: openHAB
          states:
          - id: ST_A26_BR_DOOR_OPEN
            name: DOOR_OPEN
        - id: D262
          name: BedroomLamp_A26
          type: smart_light
          platform: HomeAssistant
          capabilities:
          - id: CAP_A26_BR_LIGHT_POWER
            name: POWER
          states:
          - id: ST_A26_BR_LIGHT_POWER
            name: LIGHT_POWER
      - id: R262
        name: LivingRoom
        devices:
        - id: D263
          name: LivingRoomTempSensor_A26
          type: temperature_sensor
          platform: HomeAssistant
          states:
          - id: ST_A26_LR_TEMP_SENSOR
            name: TEMPERATURE_READING
        - id: D264
          name: LivingRoomHeater_A26
          type: heater
          platform: SmartThings
          capabilities:
          - id: CAP_A26_LR_HEATER_POWER
            name: POWER
          states:
          - id: ST_A26_LR_HEATER_POWER
            name: HEATER_POWER
semantics:
  affects:
  - from_capability_id: CAP_A26_BR_LIGHT_POWER
    to_state_id: ST_A26_BR_LIGHT_POWER
    note: Bedroom light actuation changes light state.
  - from_capability_id: CAP_A26_LR_HEATER_POWER
    to_state_id: ST_A26_LR_HEATER_POWER
    note: Heater actuation changes heater state.
  - from_capability_id: CAP_A26_LR_HEATER_POWER
    to_evar_id: EV_A26_LR_TEMP
    note: Heater operation increases living room ambient temperature.
evars:
- id: EV_A26_LR_TEMP
  name: LivingRoomAmbientTemperature
  scope: room
  scope_id: R262
contexts:
- id: CTX_A26_OCCUPIED
  name: Occupied
  scope: apartment
  scope_id: A26
states: []
rules:
- id: R_A26_BR_1
  name: Bedroom Door Welcome Light
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A26
  description: Turns on the bedroom lamp when the bedroom door opens while occupied.
  triggers:
  - id: T_A26_BR_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A26_BR_DOOR_OPEN
      role: OBSERVE
  conditions:
  - id: C_A26_BR_1
    type: context
    operator: ==
    value: true
    targets:
    - kind: Context
      id: CTX_A26_OCCUPIED
      role: CHECK
  actions:
  - id: A_A26_BR_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D262
    targets:
    - kind: Capability
      id: CAP_A26_BR_LIGHT_POWER
      role: ACTUATE
- id: R_A26_LR_1
  name: Living Room Heating Comfort
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A26
  description: Turns on the living room heater when ambient temperature falls below
    the comfort threshold.
  triggers:
  - id: T_A26_LR_1
    type: evar
    operator: <
    value: 19
    targets:
    - kind: EVar
      id: EV_A26_LR_TEMP
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A26_LR_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D264
    targets:
    - kind: Capability
      id: CAP_A26_LR_HEATER_POWER
      role: ACTUATE
