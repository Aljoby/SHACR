evars: []
contexts: []
states: []
rules:
- id: R_A56_BR_1
  name: Bed Occupied Lights Off
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A56
  description: Turns off bedroom light when person gets in bed.
  triggers:
  - id: T_A56_BR_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A56_BR_BED
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A56_BR_1
    type: capability_actuation
    action: 'OFF'
