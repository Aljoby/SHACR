      id: CTX_A20_AWAY
      role: CHECK
  actions:
  - id: A_A20_LR_6
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D204
    targets:
    - kind: Capability
      id: CAP_A20_LR_CAM_POWER
      role: ACTUATE
