topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A20
      name: Apartment_20
      category: Bachelor
      rooms:
      - id: R201
        name: LivingRoom
        devices:
        - id: D201
          name: LivingRoomMotionSensor_A20
          type: motion_sensor
          platform: SmartThings
          states:
          - id: ST_A20_LR_MOTION
            name: MOTION_DETECTED
        - id: D202
          name: RobotVacuum_A20
          type: robot_vacuum
          platform: openHAB
          capabilities:
          - id: CAP_A20_LR_VACUUM_RUN
            name: RUN
          states:
          - id: ST_A20_LR_VACUUM_RUNNING
            name: VACUUM_RUNNING
        - id: D203
          name: LivingRoomLight_A20
          type: smart_light
          platform: HomeAssistant
          capabilities:
          - id: CAP_A20_LR_LIGHT_POWER
            name: POWER
          states:
          - id: ST_A20_LR_LIGHT_POWER
            name: LIGHT_POWER
        - id: D204
          name: LivingRoomCamera_A20
          type: camera
          platform: HomeAssistant
          capabilities:
          - id: CAP_A20_LR_CAM_POWER
            name: POWER
          states:
          - id: ST_A20_LR_CAM_POWER
            name: CAMERA_POWER
        - id: D205
          name: LivingRoomAlarm_A20
          type: alarm_siren
          platform: SmartThings
          capabilities:
          - id: CAP_A20_LR_ALARM
            name: SIREN
          states:
          - id: ST_A20_LR_ALARM_STATE
            name: ALARM_STATE
        - id: D206
          name: OccupancyVirtual_A20
          type: virtual_presence
          platform: HomeAssistant
          states:
          - id: ST_A20_HOME_OCCUPIED
            name: HOME_OCCUPIED
semantics:
  affects:
  - from_capability_id: CAP_A20_LR_VACUUM_RUN
    to_state_id: ST_A20_LR_VACUUM_RUNNING
    note: Vacuum actuation changes robot vacuum running state.
  - from_capability_id: CAP_A20_LR_VACUUM_RUN
    to_state_id: ST_A20_LR_MOTION
    note: Robot vacuum movement can be sensed as living room motion.
  - from_capability_id: CAP_A20_LR_LIGHT_POWER
    to_state_id: ST_A20_LR_LIGHT_POWER
    note: Light power actuation changes light state.
  - from_capability_id: CAP_A20_LR_CAM_POWER
    to_state_id: ST_A20_LR_CAM_POWER
    note: Camera power actuation changes camera state.
  - from_capability_id: CAP_A20_LR_ALARM
    to_state_id: ST_A20_LR_ALARM_STATE
    note: Alarm actuation changes alarm state.
evars: []
contexts:
- id: CTX_A20_AWAY
  name: Away
  scope: apartment
  scope_id: A20
states: []
rules:
- id: R_A20_LR_1
  name: Away Motion Alarm
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A20
  description: Triggers the alarm when motion is detected while the apartment is away.
  triggers:
  - id: T_A20_LR_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A20_LR_MOTION
      role: OBSERVE
  conditions:
  - id: C_A20_LR_1
    type: context
    operator: ==
    value: true
    targets:
    - kind: Context
      id: CTX_A20_AWAY
      role: CHECK
  actions:
  - id: A_A20_LR_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D205
    targets:
    - kind: Capability
      id: CAP_A20_LR_ALARM
      role: ACTUATE
- id: R_A20_LR_2
  name: Robot Vacuum Daily Run
  platform: openHAB
  applies_in:
    kind: Apartment
    id: A20
  description: Runs the robot vacuum for routine cleaning.
  triggers: []
  conditions: []
  actions:
  - id: A_A20_LR_2
    type: capability_actuation
    action: START
    applies_to_device_id: D202
    targets:
    - kind: Capability
      id: CAP_A20_LR_VACUUM_RUN
      role: ACTUATE
- id: R_A20_LR_3
  name: Motion Light Assist
  platform: SmartThings
  applies_in:
    kind: Apartment
    id: A20
  description: Turns on the living room light when motion is detected.
  triggers:
  - id: T_A20_LR_3
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A20_LR_MOTION
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A20_LR_3
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D203
    targets:
    - kind: Capability
      id: CAP_A20_LR_LIGHT_POWER
      role: ACTUATE
- id: R_A20_LR_4
  name: Camera Anti-Glare Off
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A20
  description: Turns off the camera when the light is on to reduce glare.
  triggers:
  - id: T_A20_LR_4
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A20_LR_LIGHT_POWER
      role: OBSERVE
  conditions: []
