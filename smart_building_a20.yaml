    action: 'OFF'
    applies_to_device_id: D204
    targets:
    - kind: Capability
      id: CAP_A20_LR_CAM_POWER
      role: ACTUATE
- id: R_A20_LR_5
  name: Occupancy From Motion
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A20
  description: Marks the home occupied when living room motion is detected.
  triggers:
  - id: T_A20_LR_5
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A20_LR_MOTION
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A20_LR_5
    type: state_update
    action: SET_TRUE
    applies_to_device_id: D206
    targets:
    - kind: State
      id: ST_A20_HOME_OCCUPIED
      role: ACTUATE
- id: R_A20_LR_6
  name: Away Surveillance
  platform: SmartThings
  applies_in:
