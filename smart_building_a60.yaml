    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A60_EN_DOORBELL
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A60_EN_2
    type: capability_actuation
    action: START
    applies_to_device_id: D6013
    targets:
    - kind: Capability
      id: CAP_A60_EN_CAM
      role: ACTUATE
