  - from_capability_id: CAP_A60_EN_CAM
    to_state_id: ST_A60_EN_CAM
    note: Camera actuation changes recording state.
evars: []
contexts: []
states: []
rules:
- id: R_A60_EN_1
  name: Doorbell Light On
  platform: SmartThings
  applies_in:
    kind: Apartment
    id: A60
  description: Turns on entrance light when doorbell is pressed.
  triggers:
  - id: T_A60_EN_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A60_EN_DOORBELL
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A60_EN_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D6012
    targets:
    - kind: Capability
      id: CAP_A60_EN_LIGHT
      role: ACTUATE
- id: R_A60_EN_2
  name: Doorbell Camera Record
  platform: openHAB
  applies_in:
    kind: Apartment
    id: A60
  description: Starts recording when doorbell is pressed.
  triggers:
