topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A21
      name: Apartment_21
      category: FamilyWithKids
      rooms:
      - id: R211
        name: Kitchen
        devices:
        - id: D211
          name: KitchenSmokeSensor_A21
          type: smoke_sensor
          platform: HomeAssistant
          states:
          - id: ST_A21_KIT_SMOKE
            name: SMOKE_DETECTED
        - id: D212
          name: KitchenExhaustFan_A21
          type: exhaust_fan
          platform: SmartThings
          capabilities:
          - id: CAP_A21_KIT_FAN_POWER
            name: POWER
          states:
          - id: ST_A21_KIT_FAN_POWER
            name: FAN_POWER
      - id: R212
        name: Hallway
        devices:
        - id: D213
          name: HallwayMotionSensor_A21
          type: motion_sensor
          platform: HomeAssistant
          states:
          - id: ST_A21_HAL_MOTION
            name: MOTION_DETECTED
        - id: D214
          name: HallwayLight_A21
          type: smart_light
          platform: SmartThings
          capabilities:
          - id: CAP_A21_HAL_LIGHT_POWER
            name: POWER
          states:
          - id: ST_A21_HAL_LIGHT_POWER
            name: LIGHT_POWER
semantics:
  affects:
  - from_capability_id: CAP_A21_KIT_FAN_POWER
    to_state_id: ST_A21_KIT_FAN_POWER
    note: Fan actuation changes exhaust fan state.
  - from_capability_id: CAP_A21_HAL_LIGHT_POWER
    to_state_id: ST_A21_HAL_LIGHT_POWER
    note: Light actuation changes hallway light state.
evars: []
contexts: []
states: []
rules:
- id: R_A21_KIT_1
  name: Smoke Ventilation
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A21
  description: Turns on the kitchen exhaust fan if smoke is detected.
  triggers:
  - id: T_A21_KIT_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A21_KIT_SMOKE
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A21_KIT_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D212
    targets:
    - kind: Capability
      id: CAP_A21_KIT_FAN_POWER
      role: ACTUATE
- id: R_A21_HAL_1
  name: Hallway Motion Light
  platform: SmartThings
  applies_in:
    kind: Apartment
    id: A21
  description: Turns on the hallway light when motion is detected.
  triggers:
  - id: T_A21_HAL_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A21_HAL_MOTION
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A21_HAL_1
    type: capability_actuation
    action: 'ON'
    applies_to_device_id: D214
    targets:
    - kind: Capability
      id: CAP_A21_HAL_LIGHT_POWER
      role: ACTUATE
