    to_state_id: ST_A23_ENT_LIGHT_POWER
    note: Light actuation changes entrance light state.
  - from_capability_id: CAP_A23_BTH_HEAT_POWER
    to_state_id: ST_A23_BTH_HEATER_POWER
    note: Heater actuation changes bathroom heater state.
evars: []
contexts: []
states: []
rules:
- id: R_A23_ENT_1
  name: Entrance Safety Light
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A23
  description: Turns on the entrance light when motion is detected.
  triggers:
  - id: T_A23_ENT_1
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A23_ENT_MOTION
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A23_ENT_1
    type: capability_actuation
    action: 'ON'
