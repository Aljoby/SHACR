topology:
  building:
    id: B1
    name: SmartBuilding_1
    apartments:
    - id: A59
      name: Apartment_59
      category: ElderlyCouple
      rooms:
      - id: R591
        name: LivingRoom
        devices:
        - id: D5911
          name: LightSensor_A59
          type: light_sensor
          platform: HomeAssistant
          states:
          - id: ST_A59_LR_LIGHT_LEVEL
            name: LIGHT_LEVEL
        - id: D5912
          name: LivingRoomBlinds_A59
          type: smart_blinds
          platform: openHAB
          capabilities:
          - id: CAP_A59_LR_BLINDS
            name: BLIND_CONTROL
          states:
          - id: ST_A59_LR_BLINDS
            name: BLIND_POSITION
        - id: D5913
          name: TempSensor_A59
          type: temperature_sensor
          platform: SmartThings
          states:
          - id: ST_A59_LR_TEMP
            name: TEMP_READING
        - id: D5914
          name: PrivacyButton_A59
          type: virtual_switch
          platform: HomeAssistant
          states:
          - id: ST_A59_LR_PRIVACY
            name: PRIVACY_ON
semantics:
  affects:
  - from_capability_id: CAP_A59_LR_BLINDS
    to_state_id: ST_A59_LR_BLINDS
    note: Blind actuation changes blind position state.
  - from_capability_id: CAP_A59_LR_BLINDS
    to_evar_id: EV_A59_LR_TEMP
    note: Open blinds let in sunlight increasing temperature.
evars:
- id: EV_A59_LR_TEMP
  name: LivingRoomTemperature
  scope: room
  scope_id: R591
contexts: []
states: []
rules:
- id: R_A59_LR_1
  name: Daylight Open Blinds
  platform: openHAB
  applies_in:
    kind: Apartment
    id: A59
  description: Opens blinds when daylight is sufficient for natural lighting.
  triggers:
  - id: T_A59_LR_1
    type: state
    operator: '>'
    value: 4000
    targets:
    - kind: State
      id: ST_A59_LR_LIGHT_LEVEL
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A59_LR_1
    type: capability_actuation
    action: OPEN
    applies_to_device_id: D5912
    targets:
    - kind: Capability
      id: CAP_A59_LR_BLINDS
      role: ACTUATE
- id: R_A59_LR_2
  name: Hot Day Close Blinds
  platform: SmartThings
  applies_in:
    kind: Apartment
    id: A59
  description: Closes blinds when temperature is too hot to keep room cool - logical conflict with daylight rule.
  triggers:
  - id: T_A59_LR_2
    type: state
    operator: '>'
    value: 28
    targets:
    - kind: State
      id: ST_A59_LR_TEMP
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A59_LR_2
    type: capability_actuation
    action: CLOSE
    applies_to_device_id: D5912
    targets:
    - kind: Capability
      id: CAP_A59_LR_BLINDS
      role: ACTUATE
- id: R_A59_LR_3
  name: Privacy Mode Close Blinds
  platform: HomeAssistant
  applies_in:
    kind: Apartment
    id: A59
  description: Closes blinds when privacy mode is enabled - additional logical conflict.
  triggers:
  - id: T_A59_LR_3
    type: state
    operator: ==
    value: true
    targets:
    - kind: State
      id: ST_A59_LR_PRIVACY
      role: OBSERVE
  conditions: []
  actions:
  - id: A_A59_LR_3
    type: capability_actuation
    action: CLOSE
    applies_to_device_id: D5912
    targets:
    - kind: Capability
      id: CAP_A59_LR_BLINDS
      role: ACTUATE
